services:
  postgres:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.9.2
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com
      "

  airflow-webserver:
    image: apache/airflow:2.9.2
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 10

  airflow-scheduler:
    image: apache/airflow:2.9.2
    env_file: .env
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  airflow-triggerer:
    image: apache/airflow:2.9.2
    env_file: .env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: triggerer

volumes:
  postgres_data:
